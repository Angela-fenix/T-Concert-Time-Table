<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>偶運會 時間對應表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14111f;
    --bg-soft: #1c1830;
    --panel: #221d38;
    --panel-line: #362f52;
    --ink: #f2eefb;
    --ink-dim: #b6aed4;
    --ink-faint: #7d75a0;
    --gold: #f4c430;

    --c-stage:   #ff3e80;
    --c-outdoor: #35d0c4;
    --c-vip:     #f4c430;
    --c-photo:   #a78bfa;
    --c-shake:   #ff8a3d;
    --c-water:   #4ea8ff;
  }

  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; min-height:100vh;
    background: radial-gradient(ellipse 120% 80% at 50% -10%, #2c2350 0%, var(--bg) 55%);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .display{ font-family: 'Baloo 2', 'Noto Sans TC', sans-serif; }
  .mono{ font-family: 'JetBrains Mono', monospace; }

  button{ font-family: inherit; cursor: pointer; }
  :focus-visible{ outline: 2px solid var(--gold); outline-offset: 2px; }

  /* ---------- layout shells ---------- */
  .screen{ min-height: 100vh; width:100%; }
  .hidden{ display:none !important; }

  /* ---------- date select screen ---------- */
  #dateScreen{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 8vh 20px 6vh;
    gap: 48px;
    text-align:center;
  }
  .eyebrow{
    letter-spacing: .3em; font-size: 12px; color: var(--gold);
    font-family:'JetBrains Mono',monospace; text-transform:uppercase;
  }
  .hero-title{
    font-size: clamp(34px, 7vw, 64px);
    font-weight: 800;
    margin: 10px 0 6px;
    background: linear-gradient(90deg, #ffdf80, #ff8ab8 45%, #7ec9ff 90%);
    -webkit-background-clip: text; background-clip:text; color:transparent;
    line-height:1.15;
  }
  .hero-sub{ color: var(--ink-dim); font-size:15px; }

  .ticket-row{ display:flex; gap:28px; flex-wrap:wrap; justify-content:center; }

  .ticket{
    position:relative;
    width: 230px;
    background: linear-gradient(160deg, var(--panel), var(--bg-soft));
    border: 1px solid var(--panel-line);
    border-radius: 18px;
    padding: 26px 20px 22px;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
    box-shadow: 0 0 0 rgba(244,196,48,0);
  }
  .ticket::before, .ticket::after{
    content:""; position:absolute; width:22px; height:22px; border-radius:50%;
    background: var(--bg); top:50%; transform:translateY(-50%);
  }
  .ticket::before{ left:-11px; }
  .ticket::after{ right:-11px; }
  .ticket .perf{
    position:absolute; left:14px; right:14px; top:50%; transform:translateY(-50%);
    border-top: 2px dashed var(--panel-line);
  }
  .ticket:hover{
    transform: translateY(-6px);
    border-color: var(--gold);
    box-shadow: 0 12px 30px rgba(244,196,48,.15);
  }
  .ticket .day-label{ font-size:12px; letter-spacing:.2em; color:var(--ink-faint); font-family:'JetBrains Mono',monospace; }
  .ticket .day-date{ font-size: 40px; font-weight:800; font-family:'Baloo 2',sans-serif; margin: 2px 0; }
  .ticket .day-week{ font-size:15px; color: var(--gold); font-weight:700; }
  .ticket .day-go{
    margin-top:14px; font-size:13px; color: var(--ink-dim);
    border-top:1px solid var(--panel-line); padding-top:12px; width:100%;
  }

  /* ---------- schedule screen ---------- */
  #scheduleScreen{ padding: 22px 16px 60px; }
  .sched-header{
    display:flex; align-items:center; gap:14px; max-width:1100px; margin:0 auto 18px;
  }
  .back-btn{
    background: var(--panel); border:1px solid var(--panel-line); color:var(--ink);
    border-radius:999px; padding:9px 16px; font-size:13px; font-weight:600;
    display:flex; align-items:center; gap:6px;
  }
  .back-btn:hover{ border-color: var(--gold); color: var(--gold); }
  .sched-title{ font-size: clamp(20px,4vw,28px); font-weight:800; font-family:'Baloo 2',sans-serif; }
  .sched-title .wk{ color: var(--gold); font-size:.6em; margin-left:8px; }

  .legend{
    max-width:1100px; margin: 0 auto 16px; display:flex; gap:10px 16px; flex-wrap:wrap;
  }
  .legend-item{ display:flex; align-items:center; gap:7px; font-size:12px; color:var(--ink-dim); }
  .legend-dot{ width:9px; height:9px; border-radius:3px; }

  .table-wrap{
    max-width:1100px; margin: 0 auto; overflow-x:auto;
    border:1px solid var(--panel-line); border-radius:14px;
    background: var(--panel);
  }
  table.sched{
    border-collapse: collapse; width:100%; min-width: 720px;
  }
  table.sched th, table.sched td{
    border: 1px solid var(--panel-line);
    vertical-align: top;
  }
  table.sched thead th{
    position: sticky; top:0; z-index:2;
    background: var(--bg-soft);
    font-size: 12px; padding: 12px 6px;
    font-weight:700; letter-spacing:.03em;
  }
  table.sched thead th:first-child{ left:0; z-index:3; }
  table.sched .time-col{
    position: sticky; left:0; z-index:1;
    background: var(--bg-soft);
    font-family:'JetBrains Mono',monospace;
    font-size: 12px; color: var(--ink-faint);
    text-align:center; padding: 6px 8px; white-space:nowrap;
    width: 64px;
  }
  table.sched td.empty{ background: transparent; }
  table.sched td.event{
    padding:0; cursor:pointer; position:relative;
    background-clip: padding-box;
  }
  .event-inner{
    padding: 8px 26px 8px 9px; font-size:12.5px; line-height:1.45;
    white-space: pre-line; font-weight:600;
    transition: filter .15s ease, transform .1s ease;
  }
  td.event:hover .event-inner{ filter:brightness(1.15); }
  td.event:active .event-inner{ transform: scale(.98); }

  /* per-category coloring: applied to the TD itself so rowspan is always fully filled */
  td[data-cat="表演舞台"]{ background: color-mix(in srgb, var(--c-stage) 20%, var(--bg-soft)); border-left: 3px solid var(--c-stage); }
  td[data-cat="表演舞台"] .event-inner{ color:#ffd7e6; }
  td[data-cat="戶外舞台"]{ background: color-mix(in srgb, var(--c-outdoor) 18%, var(--bg-soft)); border-left: 3px solid var(--c-outdoor); }
  td[data-cat="戶外舞台"] .event-inner{ color:#cdfbf6; }
  td[data-cat="福利VIP"]{ background: color-mix(in srgb, var(--c-vip) 24%, var(--bg-soft)); border-left: 3px solid var(--c-vip); }
  td[data-cat="福利VIP"] .event-inner{ color:#fff0b3; }
  td[data-cat="拍貼合照"]{ background: color-mix(in srgb, var(--c-photo) 20%, var(--bg-soft)); border-left: 3px solid var(--c-photo); }
  td[data-cat="拍貼合照"] .event-inner{ color:#e7dcff; }
  td[data-cat="握手會"]{ background: color-mix(in srgb, var(--c-shake) 20%, var(--bg-soft)); border-left: 3px solid var(--c-shake); }
  td[data-cat="握手會"] .event-inner{ color:#ffe0c2; }
  td[data-cat="水槍挑戰"]{ background: color-mix(in srgb, var(--c-water) 20%, var(--bg-soft)); border-left: 3px solid var(--c-water); }
  td[data-cat="水槍挑戰"] .event-inner{ color:#cfe9ff; }

  .event-checkbox{
    position:absolute; top:6px; right:6px; z-index:4;
    width:17px; height:17px; accent-color: var(--gold); cursor:pointer;
  }
  td.event.is-selected{ box-shadow: inset 0 0 0 2px var(--gold); }

  .legend-dot.dot-表演舞台{ background: var(--c-stage); }
  .legend-dot.dot-戶外舞台{ background: var(--c-outdoor); }
  .legend-dot.dot-福利VIP{ background: var(--c-vip); }
  .legend-dot.dot-拍貼合照{ background: var(--c-photo); }
  .legend-dot.dot-握手會{ background: var(--c-shake); }
  .legend-dot.dot-水槍挑戰{ background: var(--c-water); }

  /* ---------- modal ---------- */
  #modalOverlay{
    position:fixed; inset:0; background: rgba(10,8,20,.72);
    backdrop-filter: blur(3px);
    display:flex; align-items:center; justify-content:center;
    padding: 20px; z-index: 50;
  }
  #modalCard{
    width: min(420px, 100%);
    background: linear-gradient(165deg, var(--panel), var(--bg-soft));
    border: 1px solid var(--panel-line);
    border-radius: 20px;
    padding: 26px 26px 22px;
    box-shadow: 0 24px 60px rgba(0,0,0,.5);
    position:relative;
    animation: pop .18s ease;
  }
  @keyframes pop{ from{ transform:scale(.94); opacity:0;} to{ transform:scale(1); opacity:1;} }
  #modalClose{
    position:absolute; top:14px; right:14px;
    background:none; border:none; color:var(--ink-faint); font-size:20px; line-height:1;
    width:30px; height:30px; border-radius:50%;
  }
  #modalClose:hover{ background: var(--panel-line); color: var(--ink); }
  .modal-cat{
    display:inline-flex; align-items:center; gap:8px;
    font-size:13px; font-weight:700; padding: 5px 12px; border-radius:999px;
    margin-bottom:16px;
  }
  .modal-time{
    font-family:'JetBrains Mono',monospace; font-size: 30px; font-weight:700;
    color: var(--ink); margin-bottom: 14px; letter-spacing:.02em;
  }
  .modal-time .arrow{ color: var(--ink-faint); font-size:20px; margin:0 8px; }
  .modal-text{
    font-size: 17px; font-weight:600; line-height:1.7; white-space: pre-line;
    color: var(--ink);
    border-top: 1px solid var(--panel-line); padding-top:14px;
  }

  /* ---------- reminder floating bar ---------- */
  #reminderBar{
    position: fixed; left:50%; bottom: 22px; transform: translateX(-50%);
    z-index: 40;
    display:flex; align-items:center; gap:14px;
    background: linear-gradient(120deg, var(--panel), var(--bg-soft));
    border: 1px solid var(--gold);
    box-shadow: 0 10px 34px rgba(0,0,0,.45);
    border-radius: 999px;
    padding: 10px 10px 10px 20px;
    font-size: 13px;
  }
  #reminderBar .count{ color: var(--ink-dim); }
  #reminderBar .count b{ color: var(--gold); font-family:'JetBrains Mono',monospace; }
  #reminderBtn{
    background: var(--gold); color:#241c05; border:none; font-weight:700;
    border-radius:999px; padding: 9px 18px; font-size:13px;
  }
  #reminderBtn:hover{ filter: brightness(1.08); }
  #clearSelectionBtn{
    background:none; border:none; color: var(--ink-faint); font-size:12px; text-decoration:underline;
  }
  #clearSelectionBtn:hover{ color: var(--ink); }

  /* ---------- reminder modal ---------- */
  #reminderModalOverlay{
    position:fixed; inset:0; background: rgba(10,8,20,.75); backdrop-filter: blur(3px);
    display:flex; align-items:center; justify-content:center; padding:20px; z-index:60;
  }
  #reminderModalCard{
    width: min(480px, 100%); max-height: 84vh; overflow-y:auto;
    background: linear-gradient(165deg, var(--panel), var(--bg-soft));
    border: 1px solid var(--panel-line); border-radius: 20px;
    padding: 26px 26px 24px; position:relative;
    box-shadow: 0 24px 60px rgba(0,0,0,.5);
    animation: pop .18s ease;
  }
  #reminderModalCard h2{ font-family:'Baloo 2',sans-serif; font-size:22px; margin: 0 0 4px; }
  #reminderModalCard .sub{ color: var(--ink-dim); font-size:13px; margin-bottom:16px; }
  #reminderClose{
    position:absolute; top:14px; right:14px; background:none; border:none;
    color:var(--ink-faint); font-size:20px; width:30px; height:30px; border-radius:50%;
  }
  #reminderClose:hover{ background: var(--panel-line); color: var(--ink); }

  .selected-list{
    list-style:none; margin:0 0 20px; padding:0; max-height:160px; overflow-y:auto;
    border:1px solid var(--panel-line); border-radius:12px;
  }
  .selected-list li{
    display:flex; justify-content:space-between; gap:8px; align-items:baseline;
    padding: 9px 12px; font-size:12.5px; border-bottom:1px solid var(--panel-line);
  }
  .selected-list li:last-child{ border-bottom:none; }
  .selected-list .sl-when{ color: var(--gold); font-family:'JetBrains Mono',monospace; white-space:nowrap; font-size:11.5px; }
  .selected-list .sl-what{ color: var(--ink-dim); flex:1; }

  .section-label{ font-size:13px; font-weight:700; margin: 4px 0 10px; color: var(--ink); }
  .minute-options{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom: 18px; }
  .minute-chip{ position:relative; }
  .minute-chip input{ position:absolute; opacity:0; inset:0; cursor:pointer; }
  .minute-chip span{
    display:block; padding:10px 16px; border-radius:999px; border:1px solid var(--panel-line);
    color: var(--ink-dim); font-size:13px; font-weight:600; font-family:'JetBrains Mono',monospace;
    transition: all .15s ease;
  }
  .minute-chip input:checked + span{
    background: color-mix(in srgb, var(--gold) 26%, transparent);
    border-color: var(--gold); color: var(--gold);
  }

  .notice-box{
    background: rgba(78,168,255,.08); border:1px solid rgba(78,168,255,.3);
    border-radius:12px; padding:12px 14px; font-size:12px; color:var(--ink-dim);
    line-height:1.6; margin-bottom:18px;
  }
  .notice-box b{ color:#9fd0ff; }

  .reminder-actions{ display:flex; flex-direction:column; gap:10px; }
  #saveReminderBtn{
    background: var(--gold); color:#241c05; border:none; font-weight:800;
    border-radius:12px; padding: 13px; font-size:15px;
  }
  #saveReminderBtn:hover{ filter:brightness(1.06); }
  #downloadIcsBtn{
    background: transparent; color: var(--ink-dim); border:1px solid var(--panel-line);
    border-radius:12px; padding:11px; font-size:13px; font-weight:600;
  }
  #downloadIcsBtn:hover{ border-color: var(--ink-dim); color: var(--ink); }
  #reminderStatus{ font-size:12px; color: var(--gold); text-align:center; min-height:16px; margin-top:4px; }

  /* ---------- debug mode ---------- */
  #debugToggleBtn{
    position: fixed; left: 12px; bottom: 12px; z-index: 70;
    background: none; border: 1px solid var(--panel-line); color: var(--ink-faint);
    font-size: 11px; padding: 5px 10px; border-radius: 999px; opacity: .35;
    font-family:'JetBrains Mono',monospace;
    transition: opacity .15s ease, border-color .15s ease, color .15s ease;
  }
  #debugToggleBtn:hover{ opacity: 1; border-color: var(--ink-faint); color: var(--ink-dim); }
  #debugToggleBtn.is-on{ opacity: 1; border-color: var(--gold); color: var(--gold); }

  .debug-banner{
    background: rgba(244,196,48,.12); border: 1px solid var(--gold);
    border-radius: 12px; padding: 10px 14px; font-size: 12px; color: var(--gold);
    margin-bottom: 16px; font-family:'JetBrains Mono',monospace; line-height:1.6;
  }
  .debug-time-input{
    background: var(--bg-soft); border: 1px solid var(--gold); color: var(--ink);
    border-radius: 8px; padding: 4px 8px; font-size: 12px; font-family:'JetBrains Mono',monospace;
  }

  @media (prefers-reduced-motion: reduce){
    .ticket, #modalCard, .event-inner{ transition:none; animation:none; }
  }

  @media (max-width: 480px){
    .ticket{ width: 44vw; padding:20px 12px 16px; }
    .ticket .day-date{ font-size:30px; }
  }
</style>
</head>
<body>

<!-- SCREEN 1: date selection -->
<section id="dateScreen" class="screen">
  <div>
    <div class="eyebrow">SCHEDULE FINDER</div>
    <h1 class="hero-title">偶運會<br>時間對應表</h1>
    <p class="hero-sub">選擇日期，查看當天完整場次時間表</p>
  </div>
  <div class="ticket-row" id="ticketRow"></div>
</section>

<!-- SCREEN 2: schedule -->
<section id="scheduleScreen" class="screen hidden">
  <div class="sched-header">
    <button class="back-btn" id="backBtn">← 重新選日期</button>
    <div class="sched-title" id="schedTitle"></div>
  </div>
  <div class="legend" id="legend"></div>
  <div class="table-wrap">
    <table class="sched" id="schedTable"></table>
  </div>
</section>

<!-- MODAL -->
<div id="modalOverlay" class="hidden">
  <div id="modalCard" role="dialog" aria-modal="true">
    <button id="modalClose" aria-label="關閉">✕</button>
    <div class="modal-cat" id="modalCat"></div>
    <div class="modal-time" id="modalTime"></div>
    <div class="modal-text" id="modalText"></div>
  </div>
</div>

<button id="debugToggleBtn">debug</button>

<!-- reminder floating bar -->
<div id="reminderBar" class="hidden">
  <span class="count">已選擇 <b id="selCount">0</b> 個場次</span>
  <button id="clearSelectionBtn">清空</button>
  <button id="reminderBtn">設定提醒 →</button>
</div>

<!-- reminder settings modal -->
<div id="reminderModalOverlay" class="hidden">
  <div id="reminderModalCard" role="dialog" aria-modal="true">
    <button id="reminderClose" aria-label="關閉">✕</button>
    <h2 class="display">設定提醒</h2>
    <p class="sub">已選擇的場次，開始前這些時間點會提醒你</p>

    <div id="debugBannerSlot"></div>
    <ul class="selected-list" id="selectedList"></ul>

    <div class="section-label">提前提醒時間（可複選）</div>
    <div class="minute-options" id="minuteOptions">
      <label class="minute-chip"><input type="checkbox" value="5"><span>5 分鐘</span></label>
      <label class="minute-chip"><input type="checkbox" value="10"><span>10 分鐘</span></label>
      <label class="minute-chip"><input type="checkbox" value="20"><span>20 分鐘</span></label>
      <label class="minute-chip"><input type="checkbox" value="30"><span>30 分鐘</span></label>
    </div>

    <div class="notice-box">
      <b>瀏覽器提醒</b>：需保持這個分頁所在的瀏覽器開啟（可切到背景），時間到會跳出系統通知。<br>
      <b>行事曆提醒</b>：下載 .ics 檔並匯入手機/平板的行事曆 App，即使網頁、瀏覽器都關閉，也會確實收到提醒，建議兩者都設定。
    </div>

    <div class="reminder-actions">
      <button id="saveReminderBtn">儲存（開啟瀏覽器提醒）</button>
      <button id="downloadIcsBtn">下載日曆提醒檔 (.ics)</button>
      <div id="reminderStatus"></div>
    </div>
  </div>
</div>

<script id="scheduleData" type="application/json">

<script>
const DATA = JSON.parse(document.getElementById('scheduleData').textContent);

const CAT_COLOR_VAR = {
  '表演舞台': '--c-stage',
  '戶外舞台': '--c-outdoor',
  '福利VIP': '--c-vip',
  '拍貼合照': '--c-photo',
  '握手會': '--c-shake',
  '水槍挑戰': '--c-water',
};

function dateLabel(key){
  // key like "20260801"
  const y = key.slice(0,4), m = key.slice(4,6), d = key.slice(6,8);
  const dt = new Date(Number(y), Number(m)-1, Number(d));
  const wk = ['日','一','二','三','四','五','六'][dt.getDay()];
  return { md: `${Number(m)}/${Number(d)}`, wk: `星期${wk}`, full: `${y}/${m}/${d}` };
}

function timeToMinutes(t){
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}

// ---------- selection & event registry (used by the reminder feature) ----------
const STORAGE_KEY = 'oundongxi_reminders_v1';

function makeEventKey(dateKey, cat, ev){
  return `${dateKey}::${cat}::${ev.start}::${ev.end || ''}`;
}

// pre-register every event so reminders can be looked up regardless of which date is on screen
const eventRegistry = {};
Object.keys(DATA).forEach(dateKey => {
  Object.keys(DATA[dateKey]).forEach(cat => {
    DATA[dateKey][cat].forEach(ev => {
      const key = makeEventKey(dateKey, cat, ev);
      eventRegistry[key] = { dateKey, cat, text: ev.text, start: ev.start, end: ev.end };
    });
  });
});

const selectedKeys = new Set();
let savedMinutesBefore = [];

// ---------- debug mode: lets you manually override an event's trigger time for testing ----------
const DEBUG_PASSWORD = 'fenix_vemtt';
let debugMode = (sessionStorage.getItem('oundongxi_debug') === '1');
const debugOverrides = {}; // key -> 'YYYY-MM-DDTHH:mm' string, only affects reminder trigger time

const debugToggleBtn = document.getElementById('debugToggleBtn');
function refreshDebugBtn(){
  debugToggleBtn.classList.toggle('is-on', debugMode);
  debugToggleBtn.textContent = debugMode ? 'debug: on' : 'debug';
}
refreshDebugBtn();

debugToggleBtn.addEventListener('click', () => {
  if(debugMode){
    debugMode = false;
    sessionStorage.removeItem('oundongxi_debug');
    refreshDebugBtn();
    return;
  }
  const pwd = prompt('輸入偵錯模式密碼：');
  if(pwd === null) return;
  if(pwd === DEBUG_PASSWORD){
    debugMode = true;
    sessionStorage.setItem('oundongxi_debug', '1');
    refreshDebugBtn();
  } else {
    alert('密碼錯誤');
  }
});

function toDatetimeLocalValue(date){
  const pad = n => String(n).padStart(2, '0');
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

// resolves the actual Date used to calculate reminder trigger times — uses the debug override
// when debug mode is on and the user has set one, otherwise falls back to the real schedule time.
// This never touches the displayed schedule table itself.
function getEffectiveStartDate(item, key){
  if(debugMode && debugOverrides[key]){
    const d = new Date(debugOverrides[key]);
    if(!isNaN(d.getTime())) return d;
  }
  const y = Number(item.dateKey.slice(0,4)), m = Number(item.dateKey.slice(4,6)), d = Number(item.dateKey.slice(6,8));
  const [hh, mm] = item.start.split(':').map(Number);
  return new Date(y, m - 1, d, hh, mm, 0, 0);
}

function loadSavedReminders(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const saved = JSON.parse(raw);
    (saved.keys || []).forEach(k => { if(eventRegistry[k]) selectedKeys.add(k); });
    savedMinutesBefore = saved.minutes || [];
    // re-arm browser notifications for anything still in the future
    if(Notification && Notification.permission === 'granted'){
      scheduleAllSelectedNotifications(savedMinutesBefore);
    }
  }catch(err){ /* ignore corrupt storage */ }
}
if(typeof localStorage !== 'undefined'){
  try{ loadSavedReminders(); }catch(err){}
}

// ---------- build date tickets ----------
const ticketRow = document.getElementById('ticketRow');
Object.keys(DATA).forEach(dateKey => {
  const lbl = dateLabel(dateKey);
  const card = document.createElement('button');
  card.className = 'ticket';
  card.innerHTML = `
    <span class="perf"></span>
    <span class="day-label">DAY</span>
    <span class="day-date display">${lbl.md}</span>
    <span class="day-week">${lbl.wk}</span>
    <span class="day-go">點擊查看場次表 →</span>
  `;
  card.addEventListener('click', () => showSchedule(dateKey));
  ticketRow.appendChild(card);
});

const dateScreen = document.getElementById('dateScreen');
const scheduleScreen = document.getElementById('scheduleScreen');
const schedTitle = document.getElementById('schedTitle');
const schedTable = document.getElementById('schedTable');
const legendEl = document.getElementById('legend');

document.getElementById('backBtn').addEventListener('click', () => {
  scheduleScreen.classList.add('hidden');
  dateScreen.classList.remove('hidden');
});

let currentDateKey = null;

function showSchedule(dateKey){
  currentDateKey = dateKey;
  const lbl = dateLabel(dateKey);
  schedTitle.innerHTML = `${lbl.full}（${lbl.wk}）場次時間表 <span class="wk"></span>`;
  buildLegend(DATA[dateKey]);
  buildTable(DATA[dateKey]);
  dateScreen.classList.add('hidden');
  scheduleScreen.classList.remove('hidden');
  scheduleScreen.scrollTop = 0;
  window.scrollTo(0,0);
}

function buildLegend(categories){
  legendEl.innerHTML = '';
  Object.keys(categories).forEach(cat => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot dot-${cat}"></span>${cat}`;
    legendEl.appendChild(item);
  });
}

function buildTable(categories){
  const catNames = Object.keys(categories);

  // gather all distinct time breakpoints
  const timeSet = new Set();
  catNames.forEach(cat => {
    categories[cat].forEach(ev => {
      if(ev.start) timeSet.add(ev.start);
      if(ev.end) timeSet.add(ev.end);
    });
  });
  const times = Array.from(timeSet).sort((a,b) => timeToMinutes(a) - timeToMinutes(b));

  // rowState[cat] = array over intervals [i, i+1): null | 'skip' | {event, span}
  const rowState = {};
  catNames.forEach(cat => {
    const arr = new Array(times.length - 1).fill(null);
    categories[cat].forEach(ev => {
      if(!ev.start) return;
      let startIdx = times.indexOf(ev.start);
      let endIdx = ev.end ? times.indexOf(ev.end) : startIdx + 1;
      if(endIdx <= startIdx) endIdx = startIdx + 1;
      endIdx = Math.min(endIdx, arr.length);
      if(startIdx >= arr.length) return;
      arr[startIdx] = { event: ev, span: endIdx - startIdx };
      for(let i = startIdx+1; i < endIdx; i++){ arr[i] = 'skip'; }
    });
    rowState[cat] = arr;
  });

  // header
  let html = '<thead><tr><th>時間</th>';
  catNames.forEach(cat => { html += `<th>${cat}</th>`; });
  html += '</tr></thead><tbody>';

  for(let r = 0; r < times.length - 1; r++){
    html += `<tr><td class="time-col">${times[r]}</td>`;
    catNames.forEach(cat => {
      const cell = rowState[cat][r];
      if(cell === 'skip') return; // covered by rowspan above
      if(cell === null){
        html += '<td class="empty"></td>';
      } else {
        const ev = cell.event;
        const key = makeEventKey(currentDateKey, cat, ev);
        const checked = selectedKeys.has(key) ? 'checked' : '';
        const selCls = selectedKeys.has(key) ? ' is-selected' : '';
        html += `<td class="event${selCls}" data-cat="${cat}" data-key="${key}" rowspan="${cell.span}" data-start="${ev.start}" data-end="${ev.end || ''}" data-text="${escapeAttr(ev.text)}">`;
        html += `<input type="checkbox" class="event-checkbox" data-key="${key}" ${checked}>`;
        html += `<div class="event-inner">${escapeHtml(ev.text)}</div></td>`;
      }
    });
    html += '</tr>';
  }
  html += '</tbody>';
  schedTable.innerHTML = html;

  schedTable.querySelectorAll('td.event').forEach(td => {
    td.addEventListener('click', () => {
      openModal(td.getAttribute('data-cat'), td.getAttribute('data-start'), td.getAttribute('data-end'), td.getAttribute('data-text'));
    });
  });

  schedTable.querySelectorAll('.event-checkbox').forEach(cb => {
    cb.addEventListener('click', (e) => e.stopPropagation());
    cb.addEventListener('change', (e) => {
      e.stopPropagation();
      const key = cb.getAttribute('data-key');
      const td = cb.closest('td.event');
      if(cb.checked){ selectedKeys.add(key); td.classList.add('is-selected'); }
      else{ selectedKeys.delete(key); td.classList.remove('is-selected'); }
      updateReminderBar();
    });
  });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function escapeAttr(str){
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

// ---------- modal ----------
const modalOverlay = document.getElementById('modalOverlay');
const modalCat = document.getElementById('modalCat');
const modalTime = document.getElementById('modalTime');
const modalText = document.getElementById('modalText');

function openModal(cat, start, end, text){
  modalCat.textContent = cat;
  const varName = CAT_COLOR_VAR[cat] || '--c-vip';
  modalCat.style.background = `color-mix(in srgb, var(${varName}) 30%, transparent)`;
  modalCat.style.color = `var(${varName})`;
  modalTime.innerHTML = end ? `${start}<span class="arrow">→</span>${end}` : `${start}<span class="arrow">→</span>…`;
  modalText.textContent = text;
  modalOverlay.classList.remove('hidden');
}
document.getElementById('modalClose').addEventListener('click', () => modalOverlay.classList.add('hidden'));
modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) modalOverlay.classList.add('hidden'); });
document.addEventListener('keydown', (e) => { if(e.key === 'Escape'){ modalOverlay.classList.add('hidden'); reminderModalOverlay.classList.add('hidden'); } });

// ---------- reminder floating bar ----------
const reminderBar = document.getElementById('reminderBar');
const selCountEl = document.getElementById('selCount');

function updateReminderBar(){
  const n = selectedKeys.size;
  selCountEl.textContent = n;
  reminderBar.classList.toggle('hidden', n === 0);
}
document.getElementById('clearSelectionBtn').addEventListener('click', () => {
  selectedKeys.clear();
  updateReminderBar();
  // re-render current table (if visible) to uncheck boxes
  if(currentDateKey && !scheduleScreen.classList.contains('hidden')){ buildTable(DATA[currentDateKey]); }
});
updateReminderBar();

// ---------- reminder settings modal ----------
const reminderModalOverlay = document.getElementById('reminderModalOverlay');
const selectedListEl = document.getElementById('selectedList');
const reminderStatus = document.getElementById('reminderStatus');

document.getElementById('reminderBtn').addEventListener('click', openReminderModal);
document.getElementById('reminderClose').addEventListener('click', () => reminderModalOverlay.classList.add('hidden'));
reminderModalOverlay.addEventListener('click', (e) => { if(e.target === reminderModalOverlay) reminderModalOverlay.classList.add('hidden'); });

function openReminderModal(){
  reminderStatus.textContent = '';
  // populate selected list, sorted by date then time
  const items = Array.from(selectedKeys).map(k => ({ key: k, item: eventRegistry[k] })).filter(x => x.item);
  items.sort((a,b) => (a.item.dateKey + a.item.start).localeCompare(b.item.dateKey + b.item.start));

  const debugBanner = debugMode
    ? `<div class="debug-banner">🐞 偵錯模式已開啟：可手動調整下方每個場次的觸發時間來測試提醒，不會影響原本的表格時間。</div>`
    : '';

  const listHtml = items.map(({key, item}) => {
    const lbl = dateLabel(item.dateKey);
    const firstLine = item.text.split('\n')[0];
    if(debugMode){
      const effective = getEffectiveStartDate(item, key);
      return `<li><span class="sl-what">${escapeHtml(item.cat)} · ${escapeHtml(firstLine)}<br><span style="color:var(--ink-faint)">原時間 ${lbl.md} ${item.start}</span></span>
        <input type="datetime-local" class="debug-time-input" data-key="${key}" value="${toDatetimeLocalValue(effective)}"></li>`;
    }
    return `<li><span class="sl-what">${escapeHtml(item.cat)} · ${escapeHtml(firstLine)}</span><span class="sl-when">${lbl.md} ${item.start}</span></li>`;
  }).join('') || '<li><span class="sl-what">尚未選擇任何場次</span></li>';

  selectedListEl.innerHTML = listHtml;
  document.getElementById('debugBannerSlot').innerHTML = debugBanner;

  selectedListEl.querySelectorAll('.debug-time-input').forEach(input => {
    input.addEventListener('change', () => {
      debugOverrides[input.getAttribute('data-key')] = input.value;
    });
  });

  // restore previously chosen minute checkboxes
  document.querySelectorAll('#minuteOptions input[type=checkbox]').forEach(cb => {
    cb.checked = savedMinutesBefore.includes(Number(cb.value));
  });

  reminderModalOverlay.classList.remove('hidden');
}

function getCheckedMinutes(){
  return Array.from(document.querySelectorAll('#minuteOptions input[type=checkbox]:checked')).map(cb => Number(cb.value));
}

// setTimeout can't handle delays over ~24.8 days in one call — chain it so long waits still work
function longTimeout(fn, delay){
  const MAX = 2147483647;
  if(delay > MAX){ setTimeout(() => longTimeout(fn, delay - MAX), MAX); }
  else{ setTimeout(fn, Math.max(delay, 0)); }
}

function fireReminder(item, minutesBefore){
  const firstLine = item.text.split('\n')[0];
  const title = `⏰ ${minutesBefore} 分鐘後開始`;
  const body = `${item.cat}｜${item.start} ${firstLine}`;
  if(typeof Notification !== 'undefined' && Notification.permission === 'granted'){
    try{ new Notification(title, { body }); return; }catch(err){ /* fall through */ }
  }
  // last-resort fallback if notifications aren't available while tab is open
  console.log(title, body);
}

function scheduleAllSelectedNotifications(minutes){
  const now = new Date();
  selectedKeys.forEach(key => {
    const item = eventRegistry[key];
    if(!item) return;
    const startDate = getEffectiveStartDate(item, key);
    minutes.forEach(min => {
      const target = new Date(startDate.getTime() - min * 60000);
      const delay = target.getTime() - now.getTime();
      if(delay > 0){
        longTimeout(() => fireReminder(item, min), delay);
      }
    });
  });
}

document.getElementById('saveReminderBtn').addEventListener('click', () => {
  const minutes = getCheckedMinutes();
  if(selectedKeys.size === 0){
    reminderStatus.textContent = '請先勾選至少一個場次';
    return;
  }
  if(minutes.length === 0){
    reminderStatus.textContent = '請至少選擇一個提前提醒時間';
    return;
  }
  savedMinutesBefore = minutes;
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ keys: Array.from(selectedKeys), minutes }));

  if(typeof Notification === 'undefined'){
    reminderStatus.textContent = '此瀏覽器不支援通知，建議改用下方日曆提醒檔';
    return;
  }
  Notification.requestPermission().then(perm => {
    if(perm === 'granted'){
      scheduleAllSelectedNotifications(minutes);
      reminderStatus.textContent = '已儲存！請保持此分頁的瀏覽器開啟以收到提醒。';
    } else {
      reminderStatus.textContent = '通知權限被拒絕，請改用下方日曆提醒檔（更保險）。';
    }
  });
});

// ---------- .ics calendar export (works even with the browser fully closed) ----------
function pad2(n){ return String(n).padStart(2, '0'); }

function formatIcsLocal(dt){
  return `${dt.getFullYear()}${pad2(dt.getMonth()+1)}${pad2(dt.getDate())}T${pad2(dt.getHours())}${pad2(dt.getMinutes())}00`;
}

function escapeIcsText(str){
  return String(str).replace(/\\/g,'\\\\').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');
}

function buildIcsContent(minutes){
  const items = Array.from(selectedKeys).map(k => ({ key: k, item: eventRegistry[k] })).filter(x => x.item);
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//偶運會時間對應表//zh-TW//'];
  const stamp = formatIcsLocal(new Date()) + 'Z';
  items.forEach(({key, item}, idx) => {
    const start = getEffectiveStartDate(item, key);
    let end;
    if(item.end && !(debugMode && debugOverrides[key])){
      const y = Number(item.dateKey.slice(0,4)), m = Number(item.dateKey.slice(4,6)), d = Number(item.dateKey.slice(6,8));
      const [eh, em] = item.end.split(':').map(Number);
      end = new Date(y, m-1, d, eh, em, 0, 0);
    } else {
      end = new Date(start.getTime() + 15*60000);
    }
    lines.push('BEGIN:VEVENT');
    lines.push(`UID:oundongxi-${item.dateKey}-${idx}-${item.start.replace(':','')}@schedule`);
    lines.push(`DTSTAMP:${stamp}`);
    lines.push(`DTSTART:${formatIcsLocal(start)}`);
    lines.push(`DTEND:${formatIcsLocal(end)}`);
    lines.push(`SUMMARY:${escapeIcsText(item.cat + '｜' + item.text.split('\n')[0])}`);
    lines.push(`DESCRIPTION:${escapeIcsText(item.text)}`);
    minutes.forEach(min => {
      lines.push('BEGIN:VALARM');
      lines.push('ACTION:DISPLAY');
      lines.push(`DESCRIPTION:${escapeIcsText(min + ' 分鐘後：' + item.cat + ' ' + item.text.split('\n')[0])}`);
      lines.push(`TRIGGER:-PT${min}M`);
      lines.push('END:VALARM');
    });
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

document.getElementById('downloadIcsBtn').addEventListener('click', () => {
  const minutes = getCheckedMinutes();
  if(selectedKeys.size === 0){
    reminderStatus.textContent = '請先勾選至少一個場次';
    return;
  }
  if(minutes.length === 0){
    reminderStatus.textContent = '請至少選擇一個提前提醒時間';
    return;
  }
  savedMinutesBefore = minutes;
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ keys: Array.from(selectedKeys), minutes }));

  const ics = buildIcsContent(minutes);
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '偶運會提醒.ics';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  reminderStatus.textContent = '已下載！匯入手機/平板的行事曆 App 即可，即使關閉網頁也會提醒。';
});
</script>
